<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    GoharTwin mark  faceted gem hexagon + digital-twin motif.
    Left half: solid (physical asset). Right half: wireframe (digital twin).
    Replace this file in-place with the final brand logo when available.
  -->
  <defs>
    <linearGradient id="gtBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a90e2" />
      <stop offset="1" stop-color="#1e63b0" />
    </linearGradient>
    <linearGradient id="gtGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c46a" />
      <stop offset="1" stop-color="#d4a437" />
    </linearGradient>
  </defs>

  <!-- physical half of the gem (solid, blue) -->
  <path
    d="M256 42 L72 148 L72 364 L256 470"
    stroke="url(#gtBlue)"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- digital-twin half of the gem (wireframe, gold) -->
  <path
    d="M256 42 L440 148 L440 364 L256 470"
    stroke="url(#gtGold)"
    stroke-width="10"
    stroke-dasharray="24 16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- gem facet lines -->
  <path d="M72 148 L256 256 L440 148 M256 256 L256 470" stroke="#2f3f5c" stroke-width="6" stroke-linecap="round" />

  <!-- G monogram (physical side) -->
  <path
    d="M268 190 A92 92 0 1 0 268 334 L268 268 L224 268"
    stroke="url(#gtBlue)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- T monogram (digital side) -->
  <path d="M292 190 L404 190 M348 190 L348 334" stroke="url(#gtGold)" stroke-width="28" stroke-linecap="round" />

  <!-- twin connection nodes -->
  <circle cx="256" cy="42" r="13" fill="#4a90e2" />
  <circle cx="440" cy="148" r="11" fill="#d4a437" />
  <circle cx="440" cy="364" r="11" fill="#d4a437" />
  <circle cx="256" cy="470" r="13" fill="#d4a437" />
</svg>
